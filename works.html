<script>

document.addEventListener("DOMContentLoaded", () => {

const data = {

  w1: {
    title: "Weather Risk Simulation",
    subtitle: "VR Urban Planning & Climate Communication",
    text: `
      <p>Developed in collaboration with LIRIC and UWE.</p>
      <p>Simulated climate risk across Bristol, Taiwan, São Paulo.</p>
      <p>Focus: spatial communication and planning systems.</p>
    `,
    images: [
      "assets/button1_img1.png",
      "assets/button1_img2.png"
    ]
  },

  w2: {
    title: "Solar Panels VR",
    subtitle: "Educational XR Game",
    text: `
      <p>Built with HKBU for education workshops.</p>
      <p>Teaching solar energy systems and placement logic.</p>
    `,
    images: [
      "assets/button2_img1.png"
    ]
  },

  w3: {
    title: "Solar Data Simulation",
    subtitle: "Macro-scale Energy Visualisation",
    text: `
      <p>Simulated solar coverage density at urban scale.</p>
      <p>Focus: system-level environmental modelling.</p>
    `,
    images: [
      "assets/button3_img1.png"
    ]
  },

  w4: {
    title: "Eco Community",
    subtitle: "Interactive Storytelling XR",
    text: `
      <p>Decision-based eco-community simulation.</p>
      <p>Focus: empathy, narrative systems, sustainability.</p>
    `,
    images: [
      "assets/button4_img1.png"
    ]
  }

};

const panel = document.getElementById("work-detail");

if (!panel) {
  console.error("Missing #work-detail in HTML");
  return;
}

// render function
function renderWork(id, el) {

  const item = data[id];
  if (!item) return;

  document.querySelectorAll(".work-card").forEach(c => {
    c.classList.remove("active");
  });

  el.classList.add("active");

  const imagesHTML = (item.images || [])
    .map(src => `
      <img src="${src}" alt="${item.title}"
           onerror="this.style.display='none'">
    `)
    .join("");

  panel.classList.remove("show");

  setTimeout(() => {

    panel.innerHTML = `
      <div class="work-layout">

        <div class="work-text">
          <h2>${item.title}</h2>
          <p><b>${item.subtitle}</b></p>
          ${item.text}
        </div>

        <div class="work-media">
          ${imagesHTML}
        </div>

      </div>
    `;

    panel.classList.add("show");

  }, 120);

}

// expose globally for onclick
window.openWork = renderWork;

// auto open first item (prevents blank page feeling)
const firstCard = document.querySelector(".work-card");
if (firstCard) {
  renderWork("w1", firstCard);
}

});

</script>
