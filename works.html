<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Works</title>
  <link rel="stylesheet" href="design.css"/>

  <style>
    /* card image */
    .work-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 12px;
      display: block;
      background: #f2f2f2;
    }

    .work-layout {
      display: flex;
      gap: 24px;
    }

    .work-text {
      flex: 0.6;
    }

    .work-media {
      flex: 0.4;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .work-media img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="links">
    <a href="index.html">Home</a>
    <a class="active" href="works.html">Works</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- MAIN -->
<div class="section">

  <h1>Selected Works</h1>

  <!-- GRID -->
  <div class="work-grid">

    <div class="work-card" onclick="openWork('w1', this)">
      <h3>Weather Risk Simulation</h3>
      <p>VR Urban Planning & Climate Communication</p>
      <img class="work-thumb" src="assets/button1.png" alt="">
    </div>

    <div class="work-card" onclick="openWork('w2', this)">
      <h3>Solar Panels VR</h3>
      <p>Educational XR for Renewable Energy Learning</p>
      <img class="work-thumb" src="assets/button2.png" alt="">
    </div>

    <div class="work-card" onclick="openWork('w3', this)">
      <h3>Solar Data Simulation</h3>
      <p>Macro-scale energy system visualisation</p>
      <img class="work-thumb" src="assets/button3.png" alt="">
    </div>

    <div class="work-card" onclick="openWork('w4', this)">
      <h3>Eco Community</h3>
      <p>Interactive educational storytelling XR</p>
      <img class="work-thumb" src="assets/button4.png" alt="">
    </div>

  </div>

  <!-- DETAIL -->
  <div id="work-detail" class="work-detail"></div>

</div>

<script>

const data = {

  w1: {
    title: "Weather Risk Simulation",
    subtitle: "VR Urban Planning & Climate Communication",
    text: `
      <p>Developed in collaboration with LIRIC and the University of the West of England.</p>
      <p>Simulated weather and climate risk across Bristol, Taiwan, and São Paulo.</p>
      <p>Focus: urban planning communication and environmental awareness.</p>
    `,
    images: [
      "assets/button1_img1.png",
      "assets/button1_img2.png"
    ]
  },

  w2: {
    title: "Solar Panels VR Education Experience",
    subtitle: "Educational XR Game",
    text: `
      <p>Created with Hong Kong Baptist University.</p>
      <p>Teaches solar energy fundamentals in VR.</p>
      <p>Built for Meta Quest.</p>
    `,
    images: [
      "assets/button2_img1.png"
    ]
  },

  w3: {
    title: "Solar Panel Data Simulation",
    subtitle: "Macro-Scale Energy Visualisation",
    text: `
      <p>Simulates large-scale solar coverage systems.</p>
      <p>Focus on macro planning rather than individual placement.</p>
      <p>Built for Quest + Igloo systems.</p>
    `,
    images: [
      "assets/button3_img1.png"
    ]
  },

  w4: {
    title: "Eco Community",
    subtitle: "Interactive Storytelling XR",
    text: `
      <p>Educational narrative experience across UK, HK, Korea.</p>
      <p>Users make decisions affecting a fictional eco-community.</p>
    `,
    images: [
      "assets/button4_img1.png"
    ]
  }

};

function openWork(id, el) {

  const panel = document.getElementById("work-detail");

  document.querySelectorAll(".work-card").forEach(c => {
    c.classList.remove("active");
  });

  el.classList.add("active");

  const item = data[id];

  const imagesHTML = (item.images || [])
    .map(src => `<img src="${src}" alt="">`)
    .join("");

  panel.classList.remove("show");

  setTimeout(() => {
    panel.innerHTML = `
      <div class="work-layout">

        <div class="work-text">
          <h2>${item.title}</h2>
          <p><b>${item.subtitle}</b></p>
          ${item.text}
        </div>

        <div class="work-media">
          ${imagesHTML}
        </div>

      </div>
    `;
    panel.classList.add("show");
  }, 120);

}

</script>

</body>
</html>
