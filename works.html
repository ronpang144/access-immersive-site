<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Works</title>
  <link rel="stylesheet" href="design.css"/>
</head>

<body>

<nav class="nav">
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="links">
    <a href="index.html">Home</a>
    <a class="active" href="works.html">Works</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="section">

  <h1>Selected Works</h1>

  <!-- GRID -->
  <div class="work-grid">

    <div class="work-card" onclick="openWork('w1', this)">
      <h3>Weather Risk Simulation</h3>
      <p>VR urban planning & climate communication</p>
    </div>

    <div class="work-card" onclick="openWork('w2', this)">
      <h3>Solar Panels VR</h3>
      <p>Educational XR for renewable energy learning</p>
    </div>

    <div class="work-card" onclick="openWork('w3', this)">
      <h3>Solar Data Simulation</h3>
      <p>Macro-scale energy system visualisation</p>
    </div>

    <div class="work-card" onclick="openWork('w4', this)">
      <h3>Eco Community</h3>
      <p>Interactive educational storytelling XR</p>
    </div>

  </div>

  <!-- DETAIL PANEL -->
  <div id="work-detail" class="work-detail"></div>

</div>

<script>

const data = {
  w1: `
    <h2>Weather Risk Simulation</h2>
    <p><b>VR Urban Planning & Climate Communication</b></p>
    <p>Developed with LIRIC and University of the West of England.</p>
    <p>Simulated climate risk scenarios across Bristol, Taiwan, and São Paulo using Igloo systems.</p>
  `,

  w2: `
    <h2>Solar Panels VR Education Experience</h2>
    <p><b>Educational XR Game</b></p>
    <p>Created with Hong Kong Baptist University for education workshops.</p>
    <p>Students learned solar energy through interactive VR environments.</p>
  `,

  w3: `
    <h2>Solar Panel Data Simulation</h2>
    <p><b>Macro-Scale Energy Visualisation</b></p>
    <p>Simulated large-scale solar coverage systems in urban environments.</p>
  `,

  w4: `
    <h2>Eco Community</h2>
    <p><b>Interactive Storytelling XR</b></p>
    <p>Decision-based sustainability simulation for education workshops.</p>
  `
};

let active = null;

function openWork(id, el) {

  const panel = document.getElementById("work-detail");

  // remove previous highlight
  document.querySelectorAll(".work-card").forEach(c => {
    c.classList.remove("active");
  });

  el.classList.add("active");

  // reset animation
  panel.classList.remove("show");

  setTimeout(() => {
    panel.innerHTML = data[id];
    panel.classList.add("show");
  }, 120);
}

</script>

</body>
</html>
