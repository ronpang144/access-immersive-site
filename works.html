<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Works</title>
  <link rel="stylesheet" href="design.css"/>

  <style>
    /* card image */
    .work-card img{
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 10px;
      display: block;
    }

    /* layout fix for detail */
    .work-layout{
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .work-media img{
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="links">
    <a href="index.html">Home</a>
    <a class="active" href="works.html">Works</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- MAIN -->
<div class="section">

  <h1>Selected Works</h1>

  <!-- GRID -->
  <div class="work-grid">

    <div class="work-card" onclick="openWork('w1', this)">
      <h3>Weather Risk Simulation</h3>
      <p>VR Urban Planning & Climate Communication</p>
      <img src="assets/button1_img1.png">
    </div>

    <div class="work-card" onclick="openWork('w2', this)">
      <h3>Solar Panels VR</h3>
      <p>Educational XR for Renewable Energy Learning</p>
      <img src="assets/button2_img1.png">
    </div>

    <div class="work-card" onclick="openWork('w3', this)">
      <h3>Solar Data Simulation</h3>
      <p>Macro-scale energy system visualisation</p>
      <img src="assets/button3_img1.png">
    </div>

    <div class="work-card" onclick="openWork('w4', this)">
      <h3>Eco Community</h3>
      <p>Interactive Educational Storytelling XR</p>
      <img src="assets/button4_img1.png">
    </div>

  </div>

  <!-- DETAIL PANEL -->
  <div id="work-detail" class="work-detail"></div>

</div>

<script>

const data = {

  w1: {
    title: "Weather Risk Simulation",
    subtitle: "VR Urban Planning & Climate Communication",
    text: `
      <p>Developed with LIRIC and University of the West of England.</p>
      <p>Simulated weather and climate risk across Bristol, Taiwan, and São Paulo.</p>
    `,
    images: [
      "assets/button1_img1.png",
      "assets/button1_img2.png"
    ]
  },

  w2: {
    title: "Solar Panels VR",
    subtitle: "Educational XR Game",
    text: `
      <p>Created with HKBU and HK Education Bureau workshops.</p>
      <p>Built for Meta Quest headsets.</p>
    `,
    images: [
      "assets/button2_img1.png"
    ]
  },

  w3: {
    title: "Solar Data Simulation",
    subtitle: "Macro-scale visualisation",
    text: `
      <p>Simulated large-scale solar energy systems based on coverage density.</p>
    `,
    images: [
      "assets/button3_img1.png"
    ]
  },

  w4: {
    title: "Eco Community",
    subtitle: "Interactive Storytelling",
    text: `
      <p>Decision-based eco-community simulation across HK, Korea, UK.</p>
    `,
    images: [
      "assets/button4_img1.png"
    ]
  }

};

function openWork(id, el) {

  const panel = document.getElementById("work-detail");

  document.querySelectorAll(".work-card").forEach(c => {
    c.classList.remove("active");
  });

  el.classList.add("active");

  const item = data[id];

  const imagesHTML = (item.images || [])
    .map(src => `<img src="${src}">`)
    .join("");

  panel.classList.remove("show");

  setTimeout(() => {

    panel.innerHTML = `
      <div class="work-layout">

        <div class="work-text" style="flex:0.6">
          <h2>${item.title}</h2>
          <p><b>${item.subtitle}</b></p>
          ${item.text}
        </div>

        <div class="work-media" style="flex:0.4">
          ${imagesHTML}
        </div>

      </div>
    `;

    panel.classList.add("show");

  }, 120);

}

</script>

</body>
</html>
