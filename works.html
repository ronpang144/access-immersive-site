<script>

const data = {

  w1: {
    title: "Weather Risk Simulation",
    subtitle: "VR Urban Planning & Climate Communication",
    text: `
      <p>Developed in collaboration with LIRIC and the University of the West of England.</p>
      <p>Simulated weather and climate risk across urban planning scenarios in Bristol, Taiwan, and São Paulo.</p>
      <p>Focus: public consultation, spatial communication, and environmental awareness.</p>
    `,
    images: [
      "assets/button1_img1.png",
      "assets/button1_img2.png"
    ]
  },

  w2: {
    title: "Solar Panels VR Education Experience",
    subtitle: "Educational XR Game for Renewable Energy Learning",
    text: `
      <p>Created with Hong Kong Baptist University and HK Education Bureau workshops.</p>
      <p>Introduced solar energy fundamentals, placement logic, and efficiency concepts.</p>
      <p>Built primarily for Meta Quest headsets.</p>
    `,
    images: [
      "assets/button2_img1.png"
    ]
  },

  w3: {
    title: "Solar Panel Data Simulation",
    subtitle: "Macro-Scale Renewable Energy Visualisation",
    text: `
      <p>Simulated large-scale solar energy systems based on coverage density.</p>
      <p>Focused on macro environmental modelling across urban regions like Bristol (Easton).</p>
      <p>Developed for Meta Quest and Igloo immersive systems.</p>
    `,
    images: [
      "assets/button3_img1.png"
    ]
  },

  w4: {
    title: "Eco Community",
    subtitle: "Interactive Educational Storytelling Experience",
    text: `
      <p>Developed with Hong Kong Baptist University for workshops in Korea, Hong Kong, and the UK.</p>
      <p>Users experience a fictional eco-community and make decisions affecting sustainability outcomes.</p>
      <p>Focus: empathy, narrative systems, participatory learning.</p>
    `,
    images: [
      "assets/button4_img1.png"
    ]
  }

};

function openWork(id, el) {

  const panel = document.getElementById("work-detail");

  // clear active state
  document.querySelectorAll(".work-card").forEach(c => {
    c.classList.remove("active");
  });

  el.classList.add("active");

  const item = data[id];

  if (!item) return;

  // build images safely (handles ANY number of images)
  const imagesHTML = (item.images || [])
    .map(src => `
      <img src="${src}" alt="${item.title} image"
           onerror="this.style.display='none'">
    `)
    .join("");

  // animate out
  panel.classList.remove("show");

  setTimeout(() => {

    panel.innerHTML = `
      <div class="work-layout">

        <!-- TEXT (60%) -->
        <div class="work-text">
          <h2>${item.title}</h2>
          <p><b>${item.subtitle}</b></p>
          ${item.text}
        </div>

        <!-- MEDIA (40%) -->
        <div class="work-media">
          ${imagesHTML}
        </div>

      </div>
    `;

    panel.classList.add("show");

  }, 120);

}

</script>
