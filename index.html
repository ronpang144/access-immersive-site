<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Works</title>
  <link rel="stylesheet" href="design.css"/>
</head>

<body>

<nav class="nav">
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="links">
    <a href="index.html">Home</a>
    <a class="active" href="works.html">Works</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="section">

  <h1>Selected Works</h1>

  <!-- GRID -->
  <div class="work-grid">

    <div class="work-card" onclick="openWork('w1')">
      <div class="work-hover">
        <h3>Weather Risk Simulation</h3>
        <p>Urban planning + climate communication VR</p>
      </div>
    </div>

    <div class="work-card" onclick="openWork('w2')">
      <div class="work-hover">
        <h3>Solar Panels VR</h3>
        <p>Educational XR for renewable energy learning</p>
      </div>
    </div>

    <div class="work-card" onclick="openWork('w3')">
      <div class="work-hover">
        <h3>Solar Data Simulation</h3>
        <p>Macro-scale energy system visualisation</p>
      </div>
    </div>

    <div class="work-card" onclick="openWork('w4')">
      <div class="work-hover">
        <h3>Eco Community</h3>
        <p>Interactive educational storytelling XR</p>
      </div>
    </div>

  </div>

  <!-- DETAILS PANEL -->
  <div id="work-detail" class="work-detail hidden"></div>

</div>

<script>
const data = {
  w1: `
    <h2>Weather Risk Simulation</h2>
    <p><b>VR Urban Planning & Climate Communication</b></p>
    <p>Developed with LIRIC and University of the West of England.</p>
    <p>Simulated weather and climate risk across urban planning scenarios in Bristol, Taiwan, and São Paulo using immersive Igloo systems.</p>
    <p>Focused on improving public understanding of environmental change and planning communication.</p>
  `,

  w2: `
    <h2>Solar Panels VR Education Experience</h2>
    <p><b>Educational XR Game for Renewable Energy Learning</b></p>
    <p>Created with Hong Kong Baptist University and HK Education Bureau workshops.</p>
    <p>Students learned solar energy fundamentals by placing panels in real environments inside VR.</p>
    <p>Built primarily for Meta Quest headsets.</p>
  `,

  w3: `
    <h2>Solar Panel Data Simulation</h2>
    <p><b>Macro-Scale Renewable Energy Visualisation</b></p>
    <p>Collaborated with Hong Kong Baptist University.</p>
    <p>Simulated large-scale solar energy generation based on coverage density rather than individual placement.</p>
    <p>Developed for Meta Quest and Igloo immersive systems.</p>
  `,

  w4: `
    <h2>Eco Community</h2>
    <p><b>Interactive Educational Storytelling Experience</b></p>
    <p>Developed for workshops in Korea, Hong Kong, and the UK.</p>
    <p>Players experience life inside a sustainable community and make decisions affecting its future.</p>
    <p>Focus on empathy, storytelling, and environmental awareness.</p>
  `
};

function openWork(id) {
  const panel = document.getElementById("work-detail");

  panel.classList.remove("hidden");
  panel.innerHTML = data[id];

  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>

</body>
</html>
</html>
